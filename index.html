<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reiki & Restore Collective</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="sparkleCanvas"></canvas>

<header>
  <h1 id="pageTitle">Reiki & Restore Collective</h1>
</header>

<main id="classes">
  <!-- Class cards injected here -->
</main>

<!-- Bottom Register Button -->
<div style="text-align:center; margin:40px 0;">
  <button id="registerBtn">Register Now</button>
</div>

<!-- Modal for registration -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2>Register for Selected Classes</h2>
    <form id="registration-form">
      <input type="email" id="email" placeholder="Email" required><br>
      <input type="text" id="fullName" placeholder="Full Name"><br>
      <input type="text" id="whatsapp" placeholder="WhatsApp Number"><br>
      <label>
        <input type="checkbox" id="ack" required>
        I understand that by registering, I am fully committing to attend the classes I have selected and to hold this commitment with integrity and presence.
      </label><br>
      <button type="submit">Submit Registration</button>
    </form>
  </div>
</div>

<!-- Optional CTA link below modal if desired -->
<a id="cta" href="https://tinyurl.com/ReikiReg" target="_blank" style="display:none;">✨ Registration is now OPEN ✨</a>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="script.js"></script>
</body>
</html>
