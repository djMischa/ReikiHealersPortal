<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reiki Classes</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="main-header">
    <h1>Reiki & Restore Collective</h1>
  </header>


  <main id="classes-container">
    <!-- Class cards will be injected here -->
  </main>

  <!-- Modal -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Register for Classes</h2>
      <form id="registration-form">
        <input type="email" id="email" placeholder="Email" required><br>
        <input type="text" id="fullName" placeholder="Full Name"><br>
        <input type="text" id="whatsapp" placeholder="WhatsApp Number"><br>
        <label>
          <input type="checkbox" id="ack" required> I acknowledge terms
        </label><br>
        <button type="submit">Register</button>
      </form>
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
